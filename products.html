<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品圖庫 | 僑峯企業</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .products-header {
            background: linear-gradient(135deg, var(--accent) 0%, var(--tertiary) 100%);
            padding: 140px 0 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .lang-switch {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 999;
            display: flex;
            background: white;
            border-radius: 30px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        .lang-btn {
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-medium);
            background: none;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .lang-btn.active { background: var(--accent); color: white; }
        .filter-section {
            background: white;
            padding: 30px;
            margin: -30px auto 40px;
            max-width: 1200px;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            position: relative;
            z-index: 10;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .filter-btn {
            padding: 10px 24px;
            background: var(--cream);
            color: var(--text-medium);
            border: none;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }
        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px 80px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }
        .product-card .product-image {
            height: 200px;
            background: linear-gradient(135deg, var(--cream) 0%, #f0ebe5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-card .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        .product-card:hover .product-image img { transform: scale(1.1); }
        .product-card .product-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
        }
        .product-card:hover .product-overlay { opacity: 1; }
        .product-overlay span { color: white; font-size: 3rem; }
        .product-card .product-info { padding: 20px; text-align: center; }
        .product-card .product-category {
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .product-card .product-name {
            font-size: 1rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 5px;
        }
        .product-card .product-count { font-size: 0.8rem; color: var(--text-light); }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 30px;
            background: rgba(255,255,255,0.9);
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 30px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .back-link:hover {
            transform: translateY(-3px);
            background: var(--accent);
            color: white;
        }
        .gallery-footer { text-align: center; padding: 40px; background: var(--cream); }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .lightbox.active { display: flex; }
        .lightbox-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .lightbox-title { color: white; font-size: 1.2rem; }
        .lightbox-close {
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .lightbox-close:hover { background: var(--accent); }
        .lightbox-content {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 80px 100px;
        }
        .lightbox-main { max-width: 85%; max-height: 75vh; position: relative; }
        .lightbox-main img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .lightbox-nav:hover { background: var(--accent); }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .lightbox-footer {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: center;
        }
        .thumbnail-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            max-width: 80%;
            padding: 10px;
        }
        .thumb-img {
            width: 70px; height: 70px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            opacity: 0.5;
            transition: var(--transition);
            flex-shrink: 0;
            border: 3px solid transparent;
        }
        .thumb-img:hover, .thumb-img.active {
            opacity: 1;
            border-color: var(--accent);
        }
        .lightbox-counter {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            text-align: center;
            margin-top: 15px;
        }
        @media (max-width: 768px) {
            .gallery { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 0 20px 60px; }
            .filter-section { margin: -20px 20px 30px; padding: 20px; }
            .lightbox-content { padding: 60px 20px; }
            .lightbox-nav { width: 40px; height: 40px; font-size: 1rem; }
            .thumbnail-strip { max-width: 95%; }
            .thumb-img { width: 50px; height: 50px; }
        }
    </style>
</head>

    <div class="gallery" id="gallery"></div>
    
    <div class="gallery-footer">

        <p style="color:var(--text-medium);margin-bottom:15px;" data-lang="en" hidden>Can't find what you need?</p>

            const firstImg = `images/${encodeURIComponent(p.folder)}/${encodeURIComponent(p.images[0])}`;
            return `<div class="product-card" onclick="openProduct(${i})">
                <div class="product-image"><img src="${firstImg}" alt="${getName(p)}" onerror="this.parentElement.style.background='var(--cream)'">
                <div class="product-overlay"><span>+</span></div></div>
                <div class="product-info"><div class="product-category">${getCategoryName(p.category)}</div><div class="product-name">${getName(p)}</div><div class="product-count">${p.images.length} ${currentLang==='zh'?'張圖片':'images'}</div></div>
            </div>`;
        }).join('');
    }

    function openProduct(index) {
        const filtered = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
        const product = filtered[index];
        windowProductImages = product.images.map(img => `images/${product.folder}/${img}`);
        windowCurrentIndex = 0;
        document.getElementById('lightbox-title').textContent = getName(product);
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
        preloadAndShow(0);
    }
    
    function preloadAndShow(idx) {
        const img = new Image();
        img.onload = function() {
            document.getElementById('lightbox-content').innerHTML = `<button class="lightbox-nav lightbox-prev" onclick="prevImage()">‹</button><div class="lightbox-main"><img src="${windowProductImages[idx]}" alt=""></div><button class="lightbox-nav lightbox-next" onclick="nextImage()">›</button>`;
            document.getElementById('lightbox-counter').textContent = `${idx+1} / ${windowProductImages.length}`;
            const strip = document.getElementById('thumbnail-strip');
            if (windowProductImages.length <= 20) {
                strip.innerHTML = windowProductImages.map((im,i) => `<img class="thumb-img ${i===idx?'active':''}" src="${im}" onclick="showImage(${i})" onerror="this.style.display='none'">`).join('');
            } else { strip.innerHTML = ''; }
            if (idx > 0) new Image().src = windowProductImages[idx-1];
            if (idx < windowProductImages.length - 1) new Image().src = windowProductImages[idx+1];
        };
        img.onerror = function() {
            document.getElementById('lightbox-content').innerHTML = `<button class="lightbox-nav lightbox-prev" onclick="prevImage()">‹</button><div class="lightbox-main"><p style="color:white;text-align:center;padding:40px;">Image not available</p></div><button class="lightbox-nav lightbox-next" onclick="nextImage()">›</button>`;
        };
        img.src = windowProductImages[idx];
    }

    function showImage(idx) { windowCurrentIndex = idx; preloadAndShow(idx); }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow = ''; }
    function prevImage() { windowCurrentIndex = (windowCurrentIndex - 1 + windowProductImages.length) % windowProductImages.length; preloadAndShow(windowCurrentIndex); }
    function nextImage() { windowCurrentIndex = (windowCurrentIndex + 1) % windowProductImages.length; preloadAndShow(windowCurrentIndex); }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderGallery();
        });
    });

    function switchLang(lang) {
        currentLang = lang;
        localStorage.setItem('kiufongLang', lang);
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
        document.querySelectorAll('[data-lang]').forEach(el => { if (!el.closest('.filter-buttons')) el.hidden = el.dataset.lang !== lang; });
        document.querySelectorAll('.filter-btn').forEach(btn => btn.hidden = btn.dataset.lang !== lang);
        renderGallery();
    }

    document.addEventListener('keydown', (e) => {
        if (document.getElementById('lightbox').classList.contains('active')) {
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'Escape') closeLightbox();
        }
    });
    document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target.id === 'lightbox') closeLightbox(); });

    switchLang(currentLang);
    renderGallery();
    </script>
</body>
</html>
