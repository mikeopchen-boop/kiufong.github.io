<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品圖庫 | 僑峯企業</title>
    <meta name="description" content="僑峯企業產品圖庫 - 美術用品、木製工藝品、調色盤、畫架等產品圖片">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .products-header {
            background: linear-gradient(135deg, var(--cream) 0%, var(--warm-white) 100%);
            padding: 140px 0 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .products-header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
            opacity: 0.1;
            transform: skewX(-15deg);
            right: -25%;
        }
        
        .lang-switch {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 999;
            display: flex;
            background: white;
            border-radius: 30px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        
        .lang-btn {
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-medium);
            text-decoration: none;
            transition: var(--transition);
        }
        
        .lang-btn.active {
            background: var(--accent);
            color: white;
        }
        
        .filter-section {
            background: white;
            padding: 30px;
            margin: -30px auto 40px;
            max-width: 1200px;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            position: relative;
            z-index: 10;
        }
        
        .filter-title {
            font-size: 0.8rem;
            color: var(--text-light);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        
        .filter-btn {
            padding: 10px 24px;
            background: var(--cream);
            color: var(--text-medium);
            border: none;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }
        
        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px 80px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }
        
        .product-card .product-image {
            height: 200px;
            background: linear-gradient(135deg, var(--cream) 0%, #f0ebe5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }
        
        .product-card .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .product-card .product-info {
            padding: 20px;
            text-align: center;
        }
        
        .product-card .product-category {
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .product-card .product-name {
            font-size: 1rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .product-card .product-count {
            font-size: 0.8rem;
            color: var(--text-light);
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 30px;
            background: white;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 30px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        
        .back-link:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            background: var(--accent);
            color: white;
        }
        
        .gallery-footer {
            text-align: center;
            padding: 40px;
            background: var(--cream);
        }
        
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 20px;
                padding: 0 20px 60px;
            }
            
            .filter-section {
                margin: -20px 20px 30px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="#" class="lang-btn active" data-lang="zh">繁體中文</a>
        <a href="#" class="lang-btn" data-lang="en">English</a>
    </div>

    <div class="products-header">
        <div class="container">
            <span class="section-label">產品展示</span>
            <h1 class="section-title" id="page-title">完整產品圖庫</h1>
            <p class="section-desc" id="page-desc">瀏覽我們的產品分類</p>
            <br><br>
            <a href="index.html" class="back-link">← 返回主頁</a>
        </div>
    </div>
    
    <div class="filter-section">
        <p class="filter-title" id="filter-title">產品分類</p>
        <div class="filter-buttons" id="filter-buttons">
            <button class="filter-btn active" data-filter="all" data-zh="全部產品" data-en="All Products">全部產品</button>
            <button class="filter-btn" data-filter="wooden" data-zh="木製品" data-en="Wooden Products">木製品</button>
            <button class="filter-btn" data-filter="tools" data-zh="美術工具" data-en="Art Tools">美術工具</button>
            <button class="filter-btn" data-filter="ceramic" data-zh="陶瓷製品" data-en="Ceramic">陶瓷製品</button>
            <button class="filter-btn" data-filter="catalog" data-zh="新品型錄" data-en="New Catalog">新品型錄</button>
        </div>
    </div>
    
    <div class="gallery" id="gallery"></div>
    
    <div class="gallery-footer">
        <p style="color: var(--text-medium); margin-bottom: 15px;">想了解更多產品資訊？</p>
        <a href="index.html#contact" class="back-link">聯絡我們 →</a>
    </div>

    <script>
    const translations = {
        zh: {
            title: '完整產品圖庫',
            desc: '瀏覽我們的產品分類',
            filterTitle: '產品分類',
            allProducts: '全部產品',
            filterLabels: { wooden: '木製品', tools: '美術工具', ceramic: '陶瓷製品', catalog: '新品型錄' }
        },
        en: {
            title: 'Products Gallery',
            desc: 'Browse our product categories',
            filterTitle: 'Product Categories',
            allProducts: 'All Products',
            filterLabels: { wooden: 'Wooden', tools: 'Art Tools', ceramic: 'Ceramic', catalog: 'New Catalog' }
        }
    };

    const products = [
        // Catalog
        { category: 'catalog', name: '2015 New Products', name_zh: '2015 新產品', folder: '2015new', firstImage: '2015New Products.jpg' },
        { category: 'catalog', name: '2014 New Products', name_zh: '2014 新產品', folder: '2014new', firstImage: '2014New Products.jpg' },
        { category: 'catalog', name: '2012 New Products', name_zh: '2012 新產品', folder: '2012 new', firstImage: 'New products for December_1.jpg' },
        { category: 'catalog', name: '2011 New Products', name_zh: '2011 新產品', folder: '2011new', firstImage: '2011 NEW PRODUCTS 1.JPG' },
        
        // Wooden
        { category: 'wooden', name: 'Wooden Easel', name_zh: '木製畫架', folder: 'wooden easel', firstImage: 'ED-01.jpg' },
        { category: 'wooden', name: 'Wooden Hand Model', name_zh: '木製手部模型', folder: 'wooden hand', firstImage: 'IMG_3678.JPG' },
        { category: 'wooden', name: 'Wooden Manikin', name_zh: '木製人像模型', folder: 'wooden manikin', firstImage: '12女木頭人(原).JPG' },
        { category: 'wooden', name: 'Wooden Sketch Box', name_zh: '木製素描盒', folder: 'WOODEN SKETCH BOX', firstImage: 'ESP-88.jpg' },
        { category: 'wooden', name: 'Wooden Modeling Tools', name_zh: '木製雕塑工具', folder: 'wooden modeling tools', firstImage: '#01.JPG' },
        { category: 'wooden', name: 'Wooden Piece', name_zh: '木製工藝品', folder: 'WOODEN PIECE', firstImage: 'IMG_2557.JPG' },
        { category: 'wooden', name: 'Carving Holder', name_zh: '雕刻筆筒', folder: 'carving holder', firstImage: 'Carving Kolder11.jpg' },
        { category: 'wooden', name: 'Carving Set', name_zh: '雕刻工具組', folder: 'carving set', firstImage: 'CT-01.jpg' },
        { category: 'wooden', name: 'Cubes', name_zh: '木方塊', folder: 'cubes', firstImage: '1.jpg' },
        
        // Tools
        { category: 'tools', name: 'Palette', name_zh: '調色盤', folder: 'palette', firstImage: 'P-41.jpg' },
        { category: 'tools', name: 'Scraper', name_zh: '刮刀', folder: 'scraper', firstImage: 'C-26#1.JPG' },
        { category: 'tools', name: 'Double Ribbon Tools', name_zh: '雙色絲帶工具', folder: 'double ribbon tools', firstImage: 'C-12#2.JPG' },
        { category: 'tools', name: 'Wireend Tools', name_zh: '線端工具', folder: 'wireend tools', firstImage: '8 3-4#1.JPG' },
        { category: 'tools', name: 'Wood Ceramic Tools', name_zh: '木陶瓷工具', folder: 'wood ceramic tools', firstImage: 'C-27#1.JPG' },
        { category: 'tools', name: 'Tole Painting', name_zh: '油漆畫', folder: 'Tole Painting', firstImage: 'TP-01~TP-16.jpg' },
        
        // Ceramic
        { category: 'ceramic', name: 'Ceramic Tripod', name_zh: '陶瓷三腳架', folder: 'ceramic tripod', firstImage: 'CERAMIC TRIPOD1.jpg' },
        { category: 'ceramic', name: 'Porcelain Palette', name_zh: '瓷調色盤', folder: 'procelain palettes', firstImage: 'CB-116.jpg' }
    ];

    let currentLang = 'zh';
    let currentFilter = 'all';

    function getName(product) {
        return currentLang === 'zh' ? product.name_zh : product.name;
    }

    function getCategoryName(category) {
        if (currentLang === 'zh') {
            return { catalog: '新品型錄', wooden: '木製品', tools: '美術工具', ceramic: '陶瓷製品' }[category];
        }
        return category.charAt(0).toUpperCase() + category.slice(1);
    }

    function renderGallery() {
        const gallery = document.getElementById('gallery');
        const filtered = currentFilter === 'all' 
            ? products 
            : products.filter(p => p.category === currentFilter);
        
        gallery.innerHTML = filtered.map(p => `
            <div class="product-card">
                <div class="product-image">
                    <img src="images/${encodeURIComponent(p.folder)}/${encodeURIComponent(p.firstImage)}" alt="${getName(p)}" onerror="this.style.display='none'; this.parentElement.innerHTML='📦';">
                </div>
                <div class="product-info">
                    <div class="product-category">${getCategoryName(p.category)}</div>
                    <div class="product-name">${getName(p)}</div>
                </div>
            </div>
        `).join('');
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderGallery();
        });
    });

    // Language switch
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            currentLang = btn.dataset.lang;
            
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const t = translations[currentLang];
            document.getElementById('page-title').textContent = t.title;
            document.getElementById('page-desc').textContent = t.desc;
            document.getElementById('filter-title').textContent = t.filterTitle;
            
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.textContent = currentLang === 'zh' ? b.dataset.zh : b.dataset.en;
            });
            
            renderGallery();
        });
    });

    // Initialize
    renderGallery();
    </script>
</body>
</html>
